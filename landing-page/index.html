    <!-- UTM Link Updater -->
    <script>
      (function() {
        function getUTMParams() {
          var params = new URLSearchParams(window.location.search);
          var utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid', 'ref', 'src'];
          var result = {};
          utmKeys.forEach(function(key) {
            var val = params.get(key);
            if (val) result[key] = val;
          });
          return result;
        }

        function updateLinks() {
          var utmParams = getUTMParams();
          var keys = Object.keys(utmParams);
          if (keys.length === 0) return;

          var links = document.querySelectorAll('a[href]');
          links.forEach(function(link) {
            var href = link.getAttribute('href');
            if (!href) return;
            if (href.startsWith('#') || href.startsWith('javascript:')) return;
            try {
              var url = new URL(href, window.location.origin);
              keys.forEach(function(key) {
                if (!url.searchParams.has(key)) {
                  url.searchParams.set(key, utmParams[key]);
                }
              });
              link.setAttribute('href', url.toString());
            } catch(e) {
              // skip invalid URLs
            }
          });
        }

        var observer = new MutationObserver(function() {
          updateLinks();
        });

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['href'] });
            updateLinks();
          });
        } else {
          observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['href'] });
          updateLinks();
        }
      })();
    </script>

    <!-- PROTECAO ANTI-CLONAGEM -->
    <script>
      (function () {
        document.addEventListener('contextmenu', function(e) {
          e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
          if (
            e.key === 'F12' ||
            (e.ctrlKey && e.key === 'u') ||
            (e.ctrlKey && e.shiftKey && e.key === 'I') ||
            (e.ctrlKey && e.shiftKey && e.key === 'J') ||
            (e.ctrlKey && e.shiftKey && e.key === 'C')
          ) {
            e.preventDefault();
            return false;
          }
        });

        var spyDomains = [
          'adspy.com', 'bigspy.com', 'poweradspy.com',
          'adplexity.com', 'minea.com', 'foreplay.co',
          'magicadz.com', 'dropispy.com', 'adheart.me',
          'adbeat.com', 'socialadscout.com', 'anstrex.com'
        ];
        if (typeof window !== 'undefined' && typeof document !== 'undefined') {
          var ref = document.referrer ? document.referrer.toLowerCase() : '';
          var isSpy = spyDomains.some(function(d) { return ref.includes(d); });
          if (isSpy) {
            window.location.replace('https://google.com');
          }
        }
      })();
    </script>
